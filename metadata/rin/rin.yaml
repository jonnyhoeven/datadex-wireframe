  beschrijving: |
    De Risico Index Natuurbranden werkt met 17 parameters die duiding geven aan de kans op het ontstaan van een 
    onbeheersbare natuurbrand. De opgetelde scores van de parameters bepalen het risico in een gebied per vierkante kilometer. 
    Deze duiding krijgt een 'risicokleur': rood voor een risicovol gedeelte en groen voor weinig risico's bijvoorbeeld. 
    Op basis van de RIN maken betrokken partijen keuzes voor een gebiedsgerichte aanpak. 
    Bijvoorbeeld het plaatsen van een extra bluswatervoorziening.
