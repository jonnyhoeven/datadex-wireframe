[app:main]
use = egg:ckan
full_stack = true
static_run_control = false
cache_dir = /tmp/%(ckan.site_id)s
beaker.session.key = ckan

# These will be overridden by environment variables if set
sqlalchemy.url = ${CKAN_SQLALCHEMY_URL}
ckan.datastore.write_url = ${CKAN_DATASTORE_WRITE_URL}
ckan.datastore.read_url = ${CKAN_DATASTORE_READ_URL}
solr_url = ${CKAN_SOLR_URL}
ckan.redis.url = ${CKAN_REDIS_URL}
ckan.site_url = ${CKAN_SITE_URL}
beaker.session.secret = ${CKAN_BEAKER_SESSION_SECRET}

ckan.site_id = default
ckan.plugins = stats text_view image_view recline_view spatial_metadata spatial_query harvest

ckan.views.default_views = image_view text_view recline_view

ckan.storage_path = /var/lib/ckan
ckan.max_resource_size = 100
ckan.max_image_size = 2

# Logging
[loggers]
keys = root, ckan, ckanext

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console

[logger_ckan]
level = INFO
handlers = console
qualname = ckan

[logger_ckanext]
level = INFO
handlers = console
qualname = ckanext

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(asctime)s %(levelname)-5.5s [%(name)s] %(message)s
